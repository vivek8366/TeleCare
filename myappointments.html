<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Appointments | TeleCare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00a8c6;
      --secondary: #0072ff;
      --bg: #f8fafc;
      --glass: #ffffff;
      --text-dark: #1e293b;
      --text-muted: #64748b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text-dark);
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 10px 0;
    }

    .header h2 {
      font-weight: 800;
      color: var(--secondary);
      font-size: 26px;
    }

    .btn-back {
      text-decoration: none;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 14px;
      padding: 8px 16px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid #e2e8f0;
      transition: all 0.2s;
    }

    .btn-back:hover {
      background: #f1f5f9;
      color: var(--primary);
    }

    .appointments-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .appointment-card {
      background: #fff;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
      border: 1px solid #e2e8f0;
      transition: transform 0.2s;
    }

    .appointment-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .doctor-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-dark);
    }

    .status-pill {
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .Booked { background: #fef3c7; color: #92400e; }
    .Approved { background: #dcfce7; color: #166534; }
    .Rejected { background: #fee2e2; color: #991b1b; }

    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin-bottom: 25px;
    }

    .detail-item span {
      font-weight: 700;
      color: var(--text-muted);
      display: block;
      margin-bottom: 5px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-item p {
      font-size: 15px;
      color: var(--text-dark);
      font-weight: 500;
    }

    .actions {
      border-top: 1px solid #f1f5f9;
      padding-top: 25px;
      display: flex;
      justify-content: center;
    }

    .btn-consult {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      border: none;
      padding: 14px 30px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
      font-size: 14px;
    }

    .btn-consult:hover {
      box-shadow: 0 8px 20px rgba(0, 114, 255, 0.2);
      filter: brightness(1.05);
    }

    .waiting-badge {
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      background: #f8fafc;
      padding: 10px 20px;
      border-radius: 10px;
      width: 100%;
      text-align: center;
      border: 1px dashed #e2e8f0;
    }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      background: #fff;
      border-radius: 24px;
      color: var(--text-muted);
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
    }

    .empty-state span {
      font-size: 40px;
      display: block;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>My Appointments</h2>
    <a href="patientdash.html" class="btn-back">← Back to Dashboard</a>
  </div>

  <div id="appointments-list" class="appointments-grid">
    <!-- Appointments will be injected here -->
  </div>

  <div id="empty-state" class="empty-state" style="display:none;">
    <span>📭</span>
    <h3>No appointments found.</h3>
    <p>Book your first consultation today!</p>
  </div>
</div>

<script>
if(!localStorage.getItem("token")) location="login.html";

async function loadAppointments() {
  const baseUrl = window.location.origin;
  const email = localStorage.getItem("email");
  const token = localStorage.getItem("token");

  try {
    const res = await fetch(baseUrl + `/appointments?email=${email}&role=patient`, {
      headers: { Authorization: "Bearer " + token }
    });
    
    const appointments = await res.json();
    const list = document.getElementById("appointments-list");
    const empty = document.getElementById("empty-state");

    if (!appointments || appointments.length === 0) {
      empty.style.display = "block";
      list.innerHTML = "";
      return;
    }

    empty.style.display = "none";
    list.innerHTML = appointments.map(a => `
      <div class="appointment-card">
        <div class="card-top">
          <div class="doctor-name">Dr. ${a.doctorName}</div>
          <span class="status-pill ${a.status}">${a.status}</span>
        </div>
        <div class="details">
          <div class="detail-item">
            <span>DATE</span>
            <p>${a.date}</p>
          </div>
          <div class="detail-item">
            <span>TIME</span>
            <p>${a.time}</p>
          </div>
          <div class="detail-item" style="grid-column: span 2;">
            <span>PROBLEM</span>
            <p>${a.problem || 'No description provided'}</p>
          </div>
        </div>
        <div class="actions">
          ${a.status === "Approved" 
            ? `<button class="btn-consult" onclick="consult('${a.doctorName}')">Start Consultation</button>` 
            : `<div class="waiting-badge">Waiting for doctor's approval...</div>`
          }
        </div>
      </div>
    `).join("");

  } catch (err) {
    console.error("Error loading appointments:", err);
  }
}

function consult(doctorName) {
  localStorage.setItem("doctorName", doctorName);
  window.location = "consult.html";
}

loadAppointments();
</script>

</body>
</html>
