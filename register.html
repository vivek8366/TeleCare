<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  background: url("https://images.unsplash.com/photo-1588776814546-1ffcf47267a5") no-repeat center center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Overlay */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0, 40, 80, 0.5);
}

/* CARD */
.container {
  position: relative;
  z-index: 1;
  width: 360px;
  padding: 35px;
  border-radius: 16px;
  backdrop-filter: blur(15px);
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  color: #fff;
  text-align: center;
}

.container h2 {
  margin-bottom: 20px;
}

/* INPUTS */
.input-group {
  margin-bottom: 15px;
  text-align: left;
}

.input-group label {
  font-size: 13px;
}

.input-group input,
.input-group select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.9);
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

/* LINK */
.link {
  margin-top: 15px;
  font-size: 14px;
}

.link a {
  color: #fff;
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="container">
  <h2>Create Account</h2>

  <!-- NAME -->
  <div class="input-group">
    <label>Full Name</label>
    <input id="name" type="text" placeholder="Enter Full Name">
  </div>

  <div class="input-group">
    <label>Email</label>
    <input id="email" type="email" placeholder="Enter Email">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input id="password" type="password" placeholder="Enter Password">
  </div>

  <div class="input-group">
    <label>Role</label>
    <select id="role" onchange="toggleSpec()">
      <option value="patient" selected>Patient</option>
      <option value="doctor">Doctor</option>
    </select>
  </div>

  <!-- SPECIALIZATION (Hidden by default) -->
  <div class="input-group" id="specGroup" style="display:none;">
    <label>Specialization</label>
    <select id="specialization">
      <option value="General Physician">General Physician</option>
      <option value="Cardiology">Cardiology</option>
      <option value="Dermatology">Dermatology</option>
      <option value="Neurology">Neurology</option>
      <option value="Pediatrics">Pediatrics</option>
      <option value="Psychiatry">Psychiatry</option>
      <option value="Orthopaedics">Orthopaedics</option>
      <option value="ENT">ENT</option>
    </select>
  </div>

  <button type="button" onclick="register()">Register</button>

  <div class="link">
    Already have an account? <a href="login.html">Login</a>
  </div>
</div>

<script>
function toggleSpec() {
  const role = document.getElementById("role").value;
  document.getElementById("specGroup").style.display = (role === "doctor") ? "block" : "none";
}

function register(){
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;
  const specialization = (role === "doctor") ? document.getElementById("specialization").value : "";

  if(!name || !email || !password){
    alert("Fill all fields");
    return;
  }

  const baseUrl = window.location.origin;
  fetch(baseUrl + "/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name, email, password, role, specialization})
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      alert("Registered successfully ✅");
      window.location="login.html";
    } else {
      alert(data.message);
    }
  })
  .catch(()=>alert("Server error ❌"));
}
</script>

</body>
</html>
